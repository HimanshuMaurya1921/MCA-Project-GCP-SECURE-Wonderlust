# =============================================================================
# Wanderlust — Helm values
# Lives at repo root, next to Jenkinsfile.
#
# WHAT TO EDIT HERE:
#   - replicas, ports, storage sizes, ingress config, image versions
#
# WHAT NOT TO EDIT HERE:
#   - image digests — those are injected by the pipeline via --set
# =============================================================================

global:
  namespace: wanderlust
# -----------------------------------------------------------------------------
# Backend
# -----------------------------------------------------------------------------
backend:
  name: backend
  replicas: 2
  image:
    repository: us-central1-docker.pkg.dev/piyush-gcp-500813/wanderlust-repo/wanderlust-backend-beta
    # digest is injected by Jenkins pipeline via --set backend.image.digest=...
    digest: "sha256:288832f045f14f85d074e7ac8d169cc194e101642d398b0f43bce795b9192af6"
  port:
    container: 8080
    service: 80
  service:
    type: NodePort
    # ── Resource Limits ────────────────────────────────────────
  resources:
    requests:
      cpu: "250m" # guaranteed slice — scheduler uses this
      memory: "256Mi"
    limits:
      cpu: "500m" # hard cap — won't steal from neighbors
      memory: "512Mi"
  # ── Probes ─────────────────────────────────────────────────
  probes:
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
  # ── HPA ────────────────────────────────────────────────────
  hpa:
    minReplicas: 1
    maxReplicas: 3
    cpuTargetPercent: 60 # scale up when avg CPU > 60%
    memTargetPercent: 70 # scale up when avg memory > 70%
# -----------------------------------------------------------------------------
# Frontend
# -----------------------------------------------------------------------------
frontend:
  name: frontend
  replicas: 1
  image:
    repository: us-central1-docker.pkg.dev/piyush-gcp-500813/wanderlust-repo/wanderlust-frontend-beta
    # digest is injected by Jenkins pipeline via --set frontend.image.digest=...
    digest: "sha256:b3986f5715bde869084caae2196da6ed6bcc255bd90152c42ec7da767e1d39a1"
  port:
    container: 80
    service: 80
  service:
    type: NodePort
  # ── Resource Limits ────────────────────────────────────────
  # Frontend is mostly static serving — lighter than backend
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  # ── Probes ─────────────────────────────────────────────────
  probes:
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
  # ── HPA ────────────────────────────────────────────────────
  hpa:
    minReplicas: 1
    maxReplicas: 3
    cpuTargetPercent: 60
    memTargetPercent: 70
# -----------------------------------------------------------------------------
# MongoDB
# -----------------------------------------------------------------------------
mongo:
  name: mongo
  replicas: 1
  image:
    repository: mongo
    tag: "7.0" # always pin a version — "latest" is how you get paged at 3am
  port:
    container: 27017
    service: 27017
  storage:
    size: 10Gi
    storageClass: standard-rwo
    mountPath: /data/db
# -----------------------------------------------------------------------------
# Redis
# -----------------------------------------------------------------------------
redis:
  name: redis
  replicas: 1
  image:
    repository: redis
    tag: "7.2" # pinned — same reason as above
  port:
    container: 6379
    service: 6379
  storage:
    size: 2Gi
    storageClass: standard-rwo
    mountPath: /data
# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  name: wanderlust-ingress
  class: gce
  staticIpName: gke-ingress-extip1
